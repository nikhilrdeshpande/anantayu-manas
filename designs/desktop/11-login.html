      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }

<body class="bg-background font-body text-on-background selection:bg-primary-fixed-dim selection:text-on-primary-fixed">
<!-- Suppressing Shared Nav Shells for Transactional Screen -->
<main class="min-h-screen flex flex-col items-center justify-center px-6 py-12">
<!-- Background Decorative Element (The Modern Sanctuary vibe) -->
<div class="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary-fixed/20 blur-[120px] rounded-full -z-10"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary-fixed/20 blur-[100px] rounded-full -z-10"></div>
<!-- Branding Header -->
<div class="mb-12 text-center">
<h1 class="font-headline text-4xl font-extrabold tracking-tighter text-on-surface mb-2">Anantayu</h1>
<p class="font-label text-on-surface-variant tracking-widest uppercase text-xs font-semibold">Manas Prakriti</p>
</div>
<!-- Login Card -->
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl p-8 md:p-12 shadow-[0_8px_40px_rgba(28,27,27,0.04)] border border-outline-variant/15">
<header class="mb-10">
<h2 class="font-headline text-2xl font-bold text-on-surface mb-2">Welcome Back</h2>
<p class="text-on-surface-variant text-sm">Return to your path of balance and self-discovery.</p>
</header>
<form class="space-y-8">
<!-- Email Field -->
<div class="relative group">
<label class="block font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-2" for="email">Email Address</label>
<div class="relative flex items-center border-b border-outline-variant/30 transition-all duration-300 ghost-border-focus">
<span class="material-symbols-outlined text-outline absolute left-0 text-[20px]">mail</span>
<input class="w-full pl-8 pb-3 bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-outline-variant text-base" id="email" name="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="relative group">
<div class="flex justify-between items-center mb-2">
<label class="block font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:text-on-primary-fixed-variant transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative flex items-center border-b border-outline-variant/30 transition-all duration-300 ghost-border-focus">
<span class="material-symbols-outlined text-outline absolute left-0 text-[20px]">lock</span>
<input class="w-full pl-8 pb-3 bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-outline-variant text-base" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-0 pb-3 text-outline-variant hover:text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Login Button (Gold CTA) -->
<button class="w-full group relative overflow-hidden bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold py-4 px-6 rounded-full shadow-lg shadow-primary/10 hover:scale-[1.02] active:scale-[0.98] transition-all duration-300" type="submit">
<span class="relative z-10">Sign In to Sanctuary</span>
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
</form>
<div class="mt-10 text-center">
<p class="text-on-surface-variant text-sm">
                    New to the sanctuary? 
                    <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Create Account</a>
</p>
</div>
</div>
<!-- Footer / Editorial Hint -->
<footer class="mt-12 text-center max-w-xs">
<p class="text-[10px] leading-relaxed text-outline font-label uppercase tracking-[0.2em]">
                Inspired by the Gunas. <br/>
                Designed for your Prakriti.
            </p>
</footer>
</main>
<!-- Thematic Imagery (Bento style hint in background if viewed on large screens) -->
<div class="hidden lg:block fixed right-12 top-1/2 -translate-y-1/2 w-72 h-[500px] overflow-hidden rounded-xl opacity-40 mix-blend-multiply pointer-events-none">
