<body class="bg-background font-body text-on-surface antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Main Navigation (Suppressed per shell mandate for transactional screens) -->
<main class="min-h-screen flex flex-col items-center justify-center p-6 bg-lotus-pattern" data-alt="Soft parchment background with a very subtle and elegant hand-drawn lotus pattern and warm lighting">
<!-- Language Switcher (Glassmorphism) -->
<div class="fixed top-8 right-8 z-50">
<div class="flex items-center gap-2 p-1.5 bg-surface-container-lowest/80 backdrop-blur-xl rounded-full shadow-sm border border-outline-variant/15">
<button class="px-5 py-2 text-xs font-label font-semibold tracking-widest uppercase bg-surface-container-lowest text-primary rounded-full shadow-sm">EN</button>
<button class="px-5 py-2 text-xs font-label font-semibold tracking-widest uppercase text-on-surface-variant hover:text-primary transition-colors">SA</button>
</div>
</div>
<!-- Signup Card -->
<div class="w-full max-w-[480px] bg-surface-container-lowest p-8 md:p-12 rounded-xl shadow-[0_8px_40px_rgba(28,27,27,0.04)] border border-outline-variant/10 relative overflow-hidden">
<!-- Brand Anchor -->
<div class="text-center mb-12">
<h1 class="font-headline text-3xl font-extrabold tracking-tighter text-on-surface mb-2">Anantayu</h1>
<p class="font-body text-on-surface-variant text-sm tracking-wide">Begin your journey to Manas Prakriti</p>
</div>
<form class="space-y-8">
<!-- Name Field -->
<div class="relative group">
<label class="block font-label text-[11px] font-bold uppercase tracking-widest text-on-surface-variant mb-2 group-focus-within:text-primary transition-colors" for="name">Full Name</label>
<div class="flex items-center border-b border-outline-variant/30 group-focus-within:border-primary transition-all pb-2">
<span class="material-symbols-outlined text-outline-variant group-focus-within:text-primary transition-colors mr-3" data-icon="person">person</span>
<input class="w-full bg-transparent border-none focus:ring-0 p-0 text-on-surface placeholder:text-outline-variant/60 font-medium" id="name" placeholder="Arjun Sharma" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="relative group">
<label class="block font-label text-[11px] font-bold uppercase tracking-widest text-on-surface-variant mb-2 group-focus-within:text-primary transition-colors" for="email">Email Address</label>
<div class="flex items-center border-b border-outline-variant/30 group-focus-within:border-primary transition-all pb-2">
<span class="material-symbols-outlined text-outline-variant group-focus-within:text-primary transition-colors mr-3" data-icon="mail">mail</span>
<input class="w-full bg-transparent border-none focus:ring-0 p-0 text-on-surface placeholder:text-outline-variant/60 font-medium" id="email" placeholder="arjun@sanctuary.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="relative group">
<label class="block font-label text-[11px] font-bold uppercase tracking-widest text-on-surface-variant mb-2 group-focus-within:text-primary transition-colors" for="password">Create Password</label>
<div class="flex items-center border-b border-outline-variant/30 group-focus-within:border-primary transition-all pb-2">
<span class="material-symbols-outlined text-outline-variant group-focus-within:text-primary transition-colors mr-3" data-icon="lock">lock</span>
<input class="w-full bg-transparent border-none focus:ring-0 p-0 text-on-surface placeholder:text-outline-variant/60 font-medium" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full py-5 px-8 rounded-full bg-gradient-to-br from-primary to-primary-container text-white font-headline font-bold text-lg shadow-[0_8px_24px_rgba(121,89,0,0.2)] hover:scale-[1.02] active:scale-95 transition-all duration-300">
                        Create Sanctuary Account
                    </button>
</div>
</form>
<!-- Footer Links -->
<div class="mt-12 text-center">
<p class="text-on-surface-variant text-sm font-medium">
                    Already a member?

</p>
