<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Anantayu - Welcome Back</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>

              "error-container": "#ffdad6",
              "secondary": "#466729",
              "on-surface-variant": "#4f4634",
              "background": "#fcf9f8",

              "on-secondary-fixed-variant": "#2f4f13",
              "surface-container-low": "#f6f3f2",
              "on-primary": "#ffffff",
              "tertiary-fixed": "#d4e4f6",
              "on-error": "#ffffff",
              "surface-dim": "#dcd9d9",
              "inverse-surface": "#313030",
              "surface-container-highest": "#e5e2e1",
              "on-tertiary": "#ffffff",

              "on-tertiary-container": "#2f3f4d",

              "tertiary": "#50606f",
              "surface-variant": "#e5e2e1",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-ayurvedic-gold {
            background: linear-gradient(135deg, #795900 0%, #d4a017 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-surface min-h-screen flex flex-col items-center">
<!-- Top Navigation Suppression: Not rendered for Transactional Login Flow per Protocol -->
<main class="flex-grow w-full max-w-md px-6 flex flex-col justify-center items-center py-12">
<!-- Brand Identity Section -->
<div class="mb-12 text-center">
<div class="w-20 h-20 bg-surface-container-low rounded-xl flex items-center justify-center mx-auto mb-6">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="spa">spa</span>
</div>
<h1 class="font-headline text-4xl font-extrabold tracking-tight text-on-surface mb-2">Welcome Back</h1>
<p class="text-on-surface-variant font-medium">Continue your journey to mindful balance</p>
</div>
<!-- Login Form Container -->
<div class="w-full space-y-8">
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label text-sm font-semibold text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative">
<input class="w-full h-14 px-5 rounded-lg bg-surface-container-low border-none focus:ring-2 focus:ring-primary-container text-on-surface placeholder:text-outline-variant/60 transition-all" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="block font-label text-sm font-semibold text-on-surface-variant" for="password">Password</label>
<a class="text-sm font-semibold text-primary hover:opacity-80" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full h-14 px-5 rounded-lg bg-surface-container-low border-none focus:ring-2 focus:ring-primary-container text-on-surface placeholder:text-outline-variant/60 transition-all" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-14 bg-ayurvedic-gold text-on-primary font-headline font-bold rounded-full shadow-lg shadow-primary/10 hover:opacity-90 transition-all flex items-center justify-center gap-2 group" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-xl transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Social Login Divider -->
<div class="relative py-4">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/20"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-background px-4 text-on-surface-variant/60 font-semibold tracking-widest">Or continue with</span>
</div>
</div>
<!-- Social Options -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center h-14 rounded-lg bg-surface-container-low hover:bg-surface-container-highest transition-colors">
<img alt="Google" class="w-5 h-5 grayscale opacity-70" data-alt="minimalist chrome google logo icon centered on white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA5Lf61A_o73B02LFRDkiEkMgFwpRFdc877pzR1NDZGPwIofmw0L5i2V-idNv_PtiPutaEWIxBhF-XyZSDSVDQh432E9I9N0icTNwy-n6llSPQkxhTYEFT8Qge4d0lI6HRCClYpTC9KDWTWDv5fGJWvTiCD8RrJBtH0VKWB8a28WwPjUFEAHX9UfakYiTJ_BchczO9c6dL_IPXuJwZsEiYebuXrV6x_K9NWn79Lxk1K3v6PQTaonuVyT2yXtffMj7rr4X-eWpT26Q"/>
</button>
<button class="flex items-center justify-center h-14 rounded-lg bg-surface-container-low hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-2xl text-on-surface-variant" data-icon="apple">ios</span>
</button>
</div>
</div>
<!-- Footer Call to Action -->
<div class="mt-12 text-center">
<p class="text-on-surface-variant">
                New to Anantayu? 
                <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Create Account</a>
</p>
</div>
</main>
<!-- Background Decor Elements -->
<div class="fixed top-[-10%] right-[-5%] w-64 h-64 rounded-full bg-primary-fixed/20 blur-3xl z-[-1]"></div>
<div class="fixed bottom-[-5%] left-[-10%] w-80 h-80 rounded-full bg-secondary-fixed/20 blur-3xl z-[-1]"></div>
<!-- Featured Ayurvedic Insight Card (Asymmetric Layout) -->
<section class="w-full max-w-md px-6 pb-12">
<div class="bg-surface-container-lowest p-6 rounded-xl shadow-sm relative overflow-hidden group">
<div class="relative z-10">
<span class="inline-block px-3 py-1 rounded-full bg-secondary-container text-on-secondary-container text-[10px] font-bold tracking-widest uppercase mb-3">Daily Wisdom</span>
<p class="font-headline text-on-surface text-lg leading-snug">"Health is the state of being established in one's own self."</p>
<p class="text-on-surface-variant text-sm mt-2 italic">— Sushruta Samhita</p>
</div>
<div class="absolute bottom-[-20px] right-[-20px] opacity-10 rotate-12 transition-transform group-hover:rotate-0">
<span class="material-symbols-outlined text-8xl" data-icon="energy_savings_leaf">energy_savings_leaf</span>
</div>
</div>
</section>
<!-- Bottom Shell Suppression: Task-focused screen suppresses global navigation -->
</body></html>
